services:
  app:
    image: inventory-app:latest
    container_name: inventory-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://inventory.cfmckece6q7m.ap-northeast-1.rds.amazonaws.com:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=inventory
    restart: unless-stopped
